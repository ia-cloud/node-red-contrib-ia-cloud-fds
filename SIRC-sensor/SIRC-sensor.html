 <script type="text/html" data-template-name="SiRC-sensor">

    <div id="id-block">
        <!-- 隠しのNodeプロパティ -->
        <input type="hidden" id="node-input-configReady">
        <!-- Sensor ID & type-->
        <div class="form-row">
            <label for="node-input-sensorId"><span data-i18n="editor.sensorId"></span></label>
            <input class="form-control" type="text" required="required" style="width: 130px; margin-right: 20px;"
            id="node-input-sensorId" data-i18n="[placeholder]editor.sensorId">
            <label for="node-input-sensorType"><span data-i18n="editor.sensorType"></span></label>
            <select style="width: 120px" id="node-input-sensorType">
                <option value="s100"><span data-i18n="editor.s100"></span></option>
                <option value="s200"><span data-i18n="editor.s200"></span></option>
                <option selected="selected" value="t200"><span data-i18n="editor.t200"></span></option>
                <option value="t400"><span data-i18n="editor.t400"></span></option>
            </select>
        </div>
        <hr>     
    </div>
    <!-- Tab, ownself -->
    <div class="form-row">
        <ul style="min-width: 500px; margin-bottom: 20px;" id="red-tabs">
        </ul>
    </div>
    <!-- Tab contents -->
    <div id="tabs-content" style="min-height:250px;">

        <!-- tab-object-properties starts -->
        <div id="tab-object-properties">
            <!-- period property -->
            <div class="form-row">
                <label for="node-input-period"><span data-i18n="editor.period"></span></label>
                <select style="width: 160px" id="node-input-period">
                    <option selected="selected" value="sensor"><span data-i18n="editor.sensor"></span></option>
                    <option value="1m"><span data-i18n="editor.1m"></span></option>
                    <option value="10m"><span data-i18n="editor.10m"></span></option>
                    <option value="30m"><span data-i18n="editor.30m"></span></option>
                </select>
            </div>
            <!-- object settingt -->
            <div class="form-row">
                <label for="node-input-objectKey"><span data-i18n="editor.objectKey"></span></label>
                <input class="form-control" type="text" required="required" style="width: 300px"
                  id="node-input-objectKey" data-i18n="[placeholder]editor.objectKeyholder">
            </div>
            <div class="form-row">
                <label for="node-input-objectDescription"><span data-i18n="editor.objectDescription"></span></label>
                <input class="form-control" type="text" style="width: 300px" id="node-input-objectDescription">
            </div> 
            <hr>
            <div class="form-row">
                <label for="node-input-qInfo"><span data-i18n="editor.qInfo"></span></label>
                <input type="checkbox" id="node-input-qInfo" style="display: inline-block; width: auto;" >
            </div> 
        </div>
        <!-- tab-object-properties ends -->

        <!-- tab-dataItem-properties starts-->
        <div id="tab-dataItem-properties">
            <!-- dataItem　properties -->
            <div class="form-row">
                <label for="node-input-contentType"><span data-i18n="editor.contentType"></span></label>
                <input type="text" style="width: 300px" id="node-input-contentType">
            </div>
            <div class="form-row">
                <label style="width: 150px;"><span data-i18n="editor.ruleList"></span></label>
            </div>
            <div class="node-input-dItemcontainer-row">
                <ol id="node-input-dItemcontainer">
                </ol>
            </div>
        </div>
        <!-- tab-dataItem-propertiesends -->
    </div>
    <!-- tab ends -->

    <div id="name-block">
        <hr>
        <div class="form-row">
            <label for="node-input-name" ><i class="fa fa-tag"></i><span data-i18n="editor.name"></span></label>
            <input type="text" class="form-control" id="node-input-name">
        </div>
    </div>
</script>

<script type="text/javascript">

RED.nodes.registerType('SiRC-sensor',{

    category: 'iaCloud devices',
    color:"rgb(231, 180, 100)",
    defaults: {
        name: {value:""},
        // sensor ID
        sensorId: {value:"", required: true},
        sensorType: {value:"t200", required: true},
        // object properties
        period: {value:"sensor", required: true},
        objectKey: {value:"", required: true},
        objectDescription: {value:""},

        contentType: {value: "iaCloudData", required: true},
        qInfo: {value: false},
        // 必須項目が揃っているかのflag、Nodeに赤三角を表示するために必要
        configReady: {value: "", required: true},

        // dataItems property（editableListで使用する。）
        dataItems : {value: [{},]},
    },
    inputs:1,
    outputs:1,
    icon: "ia-cloud.png",  // ia-cloud Icon
    label: function() {
        return this.name||this._("editor.paletteLabel");
    },
    labelStyle: function() {
        return this.name?"node_label_italic":"";
    },
    paletteLabel: function() {
        return this._("editor.paletteLabel") || "SiRC-sensor";
    },
    oneditprepare: function() {
        let node = this;

        const lbldName = node._("editor.dname");
        const lblunit = node._("editor.unit");
        const lblitem = node._("editor.dItem");
        const lblkWH = node._("editor.kWH");
        const lbldmnd = node._("editor.dmnd");
        const lblkW = node._("editor.kW");
        const lblkVA = node._("editor.kAV");
        const lblA = node._("editor.A");
        const lblPF = node._("editor.PF");
        const lblBATT = node._("editor.BATT");
        const lblRSSI = node._("editor.RSSI");
        const lblALM = node._("editor.ALM");

        // html elements of the editableList item 
        const paraForm1 =`
            <label style="display:inline-block; width:80px">${lblitem}</span></label>
            <select style="display:inline-block; width: 150px" class="dataSelect">
                <option selected="selected" value="kWH">${lblkWH}</option>
                <option value="dmnd">${lbldmnd}</option>
                <option value="kW">${lblkW}</option>
                <option value="kVA">${lblkVA}</option>
                <option value="A">${lblA}</option>
                <option value="PF">${lblPF}</option>
                <option value="BATT">${lblBATT}</option>
                <option value="RSSI">${lblRSSI}</option>
                <option value="ALM">${lblALM}</option>
            </select>
        `;
        const paraForm2 =`
            <span style="display:inline-block; width:30px"> </span>   
            <label style="display:inline-block; width: 80px;">${lbldName}</label>
            <input type="text" required="required" style="display:inline-block; width: 150px;" class="dName">
            <label style="display:inline-block; margin-left: 20px; width: 40px;">${lblunit}</label>
            <input type="text" style="display:inline-block; width: 60px;" class="unit">  
        `;

        // Tab
        const tabs = RED.tabs.create({
            id: 'red-tabs',
            onchange(tab) {
                $('#tabs-content').children().hide();
                $("#" + tab.id).show();
                $("#red-tabs").resize();
            },
        });
        tabs.addTab({
            id: 'tab-object-properties',
            label: this._('editor.tab.object-settings'),
        });
        tabs.addTab({
            id: 'tab-dataItem-properties',
            label: this._('editor.tab.data-settings'),
        });

        $('#node-input-dItemcontainer').css('min-height', '150px').css('min-width', '450px').editableList({
            removable: true,
            sortable: true,
            height: 500,

            // Process when click add button.
            addItem: function(container, index, dItem) {
                let div1 = $('<div></div>').appendTo(container);
                let div2 = $('<div></div>',{style:"margin-top:8px;"}).appendTo(container);

                $('<span></span>',{class:"index", 
                    style:"display:inline-block;text-align:right; width:30px; padding-right:5px;"})
                    .text((index + 1) + " :")
                    .appendTo(div1);
                $(paraForm1).appendTo(div1);

                // second row of the list
                $(paraForm2).appendTo(div2);

                // 追加ボタンが押されたら、dItemは 空{} で呼ばれるので、デフォルトセット
                if(!dItem.hasOwnProperty("dataName")) {
                    dItem.dataName = "";
                    dItem.item = "kWH",
                    dItem.unit = ""
                }

                // set back dataItem properties
                div1.find(".dataSelect").val(dItem.item);
                div2.find(".dName").val(dItem.dataName);
                div2.find(".unit").val(dItem.unit);

                // データタイプが変更されたら呼ばれるコールバック関数を登録
                div1.find(".dataSelect").change(function(){
                    let name = div2.find(".dName").val();
                    let unit = div2.find(".unit").val();
                    let type = $(this).val();

                    // set dataItem default name。
                    switch(type) {
                        case "kWH": name = lblkWH; unit = "kWH";
                            break;
                        case "kW": name = lblkW; unit = "kW";
                            break;
                        case "dmnd": name = lbldmnd; unit = "kW";
                            break;
                        case "kVA": name = lblkVA; unit = "kVA";
                            break;
                        case "A": name = lblA; unit = "A";
                            break;
                        case "PF": name = lblPF; unit = "%";
                            break;
                        case "BATT": name = lblBATT; unit = "V";
                            break;
                        case "RSSI": name = lblRSSI; unit = "dBm";
                            break;
                        case "ALM": name = lblALM; unit = "";
                            break;
                        default: name = "";
                            break;
                    }
                    div2.find(".dName").val(name);
                    div2.find(".unit").val(unit);
                });
                div1.find(".dataSelect").change();

            },
            // リストの順番が変わったら呼ばれる。
            sortItems: function(items) {
                items.each(function(i, elm){
                    // 番号を降り直し
                    elm.find(".index").text((i + 1) + ":");
                });
            },
            // リストの項目が削除されたら呼ばれる。
            removeItem: function(dItem){
                let items = $('#node-input-dItemcontainer').editableList("items");
                items.each(function(i, elm){
                    // 番号を降り直し
                    elm.find(".index").text((i + 1) + ":");
                });
            }
        });
       
        // Nodeの設定パラメータを取り出し、editableListに登録
        for (let i=0; i<node.dataItems.length; i++) {
            $("#node-input-dItemcontainer").editableList('addItem', node.dataItems[i]);
        }  

    },

    oneditsave: function() {
        let node = this;
        let configReady = "ready";
        let items = $("#node-input-dItemcontainer").editableList('items');
        // データ設定を作成
        node.dataItems = [];
        items.each(function(i, elm){
            let item = {
                item: elm.find(".dataSelect").val(),
                dataName: elm.find(".dName").val(),
                unit: elm.find(".unit").val()
            };
            // 必須propertyが揃っているか？
            if (!item.dataName) configReady = "";

            // dataItemをプロパティリストにプッシュ
            node.dataItems.push(item);
        });
        // sensor ID ?
         if (!$("#node-input-sensorId").val()) configReady = "";
        // objectKeyはある？
        if (!$("#node-input-objectKey").val()) configReady = "";
        // contentTypeはある？
         if (!$("#node-input-contentType").val()) configReady = "";

        // データ設定が一つはある？
        if (!node.dataItems[0]) configReady = "";
        // 設定完了フラグをセット
        $("#node-input-configReady").val(configReady);
    },

    oneditresize: function (size) {
        if ($("#tab-dataItem-properties").is(":visible")) {
            // エディタがリサイズされたら
            let height = size.height;

            // Tab以外の部分の高さを引く
            height -= $("#id-block").outerHeight(true);
            height -= $("#name-block").outerHeight(true);
            // dataItemプロパティTab内の、editableList以外の行の高さを引く
            let rows = $("#tab-dataItem-properties>div:not(.node-input-dItemcontainer-row)");
            for (let i=0; i<rows.length; i++) {
                height -= $(rows[i]).outerHeight(true);
            }
            // タブの部分の高さ（大体）
            height -= 80;

            // editableListのマージンを引く
            const editorRow = $("#tab-dataItem-properties>div.node-input-dItemcontainer-row");
            height -= (parseInt(editorRow.css("marginTop"))+parseInt(editorRow.css("marginBottom")));
            
            // editableListの高さを設定。editableListが非表示の時は正しく動作しない。
            $("#node-input-dItemcontainer").editableList('height',height);
        }
    }
});

</script>
